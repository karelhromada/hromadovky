<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythology True Original Template</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap');
        
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        :root {
            --card-width: 60mm;
            /* Using the original PNG aspect ratio 678:921 ≈ 1:1.36 */
            --card-height: 81.5mm; 
            --theme-color: ${COLOR};
            --bg-dark: #0f0f0f; /* Pitch black for clean coverage */
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: #1a1a1a;
        }

        .card {
            width: var(--card-width);
            height: var(--card-height);
            position: relative;
            overflow: hidden;
            background-color: #000;
            /* NO BORDER - image has its own */
        }

        .card-image {
            width: 100%; height: 100%; position: absolute;
            object-fit: fill; z-index: 1;
        }

        /* The footer overlay is NOW OFFSET from borders to keep the original frame visible */
        .footer-overlay {
            position: absolute; bottom: 1.2mm; left: 1.2mm; right: 1.2mm; height: 32%;
            background: #000; z-index: 5;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 1.5mm;
            border-radius: 0 0 3mm 3mm; /* Match card's bottom radius */
        }

        .id-name-box {
            text-align: center; margin-bottom: 1.5mm; z-index: 10;
        }

        .id-name {
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 3.6mm;
            color: var(--theme-color); text-transform: uppercase; margin: 0;
            letter-spacing: 0.3mm; line-height: 1;
        }

        .subtitle {
            font-size: 1.9mm; color: #cbd5e1; font-style: italic;
            margin-top: 0.8mm; opacity: 0.9;
        }

        .stats-grid {
            width: 100%; display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 1mm; padding: 0 1mm; z-index: 6;
        }

        .stat-box {
            background: #000; border: 0.28mm solid var(--theme-color);
            border-radius: 1.2mm; height: 11mm;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .stat-l {
            font-size: 1.1mm; color: #e2e8f0; text-transform: uppercase;
            font-weight: 700; margin-bottom: 0.5mm; letter-spacing: 0.1mm;
        }

        .stat-v {
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 3mm;
            color: #fff; line-height: 1;
        }

        /* Floating origin at the top right, but subtle */
        .origin-badge {
            position: absolute; top: 3mm; right: 3mm; z-index: 15;
            background: rgba(0,0,0,0.6); color: var(--theme-color);
            border: 0.2mm solid var(--theme-color); border-radius: 1mm;
            font-size: 1.3mm; padding: 0.4mm 1.2mm; text-transform: uppercase;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="${IMG_PATH}" class="card-image">
        <div class="origin-badge">${ORIGIN}</div>
        
        <!-- This area overlays the original footer exactly -->
        <div class="footer-overlay">
            <div class="id-name-box">
                <h1 class="id-name">${ID} - ${NAME}</h1>
                <div class="subtitle">${SUBTITLE}</div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-l">Síla</span>
                    <span class="stat-v">${SILA}</span>
                </div>
                <div class="stat-box">
                    <span class="stat-l">Magie</span>
                    <span class="stat-v">${MAGIE}</span>
                </div>
                <div class="stat-box">
                    <span class="stat-l">Stáří</span>
                    <span class="stat-v">${STARI}</span>
                </div>
                <div class="stat-box">
                    <span class="stat-l">Hrozivost</span>
                    <span class="stat-v">${HROZIVOST}</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
