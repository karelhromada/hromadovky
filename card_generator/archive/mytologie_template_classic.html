<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythology Classic Template</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap');
        
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        :root {
            --card-width: 60mm;
            --card-height: 85mm;
            --border-radius: 4mm;
            --theme-color: ${COLOR};
            --bg-dark: #121212; /* Neutral dark for better footer integration */
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #1a1a1a;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .card {
            width: var(--card-width);
            height: var(--card-height);
            position: relative;
            border-radius: var(--border-radius);
            overflow: hidden;
            background-color: #000;
            border: 1mm solid var(--theme-color);
        }

        .card-image {
            width: 100%; height: 100%; position: absolute;
            object-fit: cover; z-index: 1;
            object-position: center 2%; /* Show as much of the top as possible */
        }

        /* Blackout to hide original card footer */
        .blackout {
            position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
            background: #000; z-index: 2;
        }

        .footer {
            position: absolute; bottom: 0; left: 0; right: 0; height: 35%;
            background: var(--bg-dark); z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 2mm;
            border-top: 0.4mm solid var(--gold);
        }

        .header-info {
            text-align: center; margin-bottom: 2mm;
        }

        .id-name {
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 3.8mm;
            color: var(--theme-color); text-transform: uppercase; margin: 0;
            letter-spacing: 0.4mm;
        }

        .subtitle {
            font-size: 2.1mm; color: #cbd5e1; font-style: italic;
            margin-top: 0.5mm; opacity: 0.8;
        }

        .stats-row {
            width: 100%; display: flex; justify-content: center; gap: 1mm;
            padding: 0 1.5mm;
        }

        .stat-box {
            flex: 1; background: rgba(0,0,0,0.6); border: 0.3mm solid var(--theme-color);
            border-radius: 1.5mm; height: 11mm;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .stat-label {
            font-size: 1.2mm; color: #94a3b8; text-transform: uppercase;
            font-weight: 700; margin-bottom: 0.5mm; letter-spacing: 0.1mm;
        }

        .stat-value {
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 3.2mm;
            color: #fff; line-height: 1;
        }

        .origin-badge {
            position: absolute; top: 2.5mm; right: 2.5mm; z-index: 15;
            background: rgba(0,0,0,0.7); color: var(--theme-color);
            border: 0.2mm solid var(--theme-color); border-radius: 1mm;
            font-size: 1.4mm; padding: 0.5mm 1.5mm; text-transform: uppercase;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="${IMG_PATH}" class="card-image">
        <div class="blackout"></div>
        <div class="origin-badge">${ORIGIN}</div>
        
        <div class="footer">
            <div class="header-info">
                <h1 class="id-name">${ID} - ${NAME}</h1>
                <div class="subtitle">${SUBTITLE}</div>
            </div>
            
            <div class="stats-row">
                <div class="stat-box">
                    <span class="stat-label">Síla</span>
                    <span class="stat-value">${SILA}</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Magie</span>
                    <span class="stat-value">${MAGIE}</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Stáří</span>
                    <span class="stat-value">${STARI}</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Hrozivost</span>
                    <span class="stat-value">${HROZIVOST}</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
