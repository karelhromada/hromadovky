<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kvarteta - Prototype Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@400;500&display=swap');

        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Roboto', sans-serif;
        }

        .card {
            width: 63.5mm;
            height: 88.9mm;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            border-radius: 4mm;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            border: 2mm solid #1a1a1a;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            background: #1a1a1a;
            color: #d4af37; /* Gold */
            padding: 2mm;
            text-align: center;
            border-bottom: 1mm solid #d4af37;
        }

        .card-title {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 14pt;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px black;
        }

        .card-id {
            position: absolute;
            top: 2mm;
            left: 2mm;
            color: #fff;
            font-size: 8pt;
            font-family: 'Cinzel', serif;
            background: #d4af37;
            color: #000;
            width: 5mm;
            height: 5mm;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            z-index: 10;
        }

        .card-image-container {
            width: 100%;
            height: 45mm;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-description {
            font-size: 8pt;
            padding: 1mm 2mm;
            text-align: center;
            font-style: italic;
            color: #555;
            flex-grow: 0;
            margin-top: 1mm;
        }

        .stats-container {
            padding: 1mm 2mm;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            background: rgba(255,255,255,0.8);
            border-top: 1px solid #ccc;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding: 0.5mm 0;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-icon {
            width: 4mm;
            display: inline-block;
            text-align: center;
            margin-right: 1mm;
        }

        .stat-name {
            font-weight: 500;
            font-size: 9pt;
            flex-grow: 1;
            text-align: left;
            color: #333;
        }

        .stat-value {
            font-weight: 700;
            font-size: 10pt;
            color: #000;
        }
        
        /* Decorative elements */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid #d4af37;
            margin: 1mm;
            border-radius: 3mm;
            pointer-events: none;
            z-index: 5;
        }

    </style>
</head>
<body>

    <!-- Prototype for Pyroth (ID 1) -->
    <div class="card">
        <div class="card-id">1</div>
        <div class="card-header">
            <h1 class="card-title">Pyroth</h1>
        </div>
        <div class="card-image-container">
            <!-- Using the URL from the excel data -->
            <img src="https://cdn.midjourney.com/f738546d-3199-4458-9634-8c0147610196/0_1.png" alt="Pyroth" class="card-image">
        </div>
        <div class="card-description">
            Obrovský ohnivý drak žijící v aktivních sopkách.
        </div>
        <div class="stats-container">
            <div class="stat-row">
                <span class="stat-name">Síla</span>
                <span class="stat-value">95</span>
            </div>
            <div class="stat-row">
                <span class="stat-name">Rozpětí křídel</span>
                <span class="stat-value">45 m</span>
            </div>
            <div class="stat-row">
                <span class="stat-name">Dosah útoku</span>
                <span class="stat-value">120 m</span>
            </div>
            <div class="stat-row">
                <span class="stat-name">Věk</span>
                <span class="stat-value">1200 let</span>
            </div>
            <div class="stat-row">
                <span class="stat-name">Rychlost</span>
                <span class="stat-value">180 km/h</span>
            </div>
        </div>
    </div>

</body>
</html>
