<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap');
        
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: #1a1a1a;
        }

        /* 
           Standardized Kvarteta Size: 60x85mm 
           At 678px width, 85mm height corresponds to ~961px 
        */
        .card-container {
            width: 678px;
            height: 961px;
            position: relative;
            background-color: #000;
            overflow: hidden;
            /* Matte optimization filters */
            filter: brightness(1.10) contrast(1.05) url(#sharpen);
            image-rendering: -webkit-optimize-contrast;
        }

        /* The original AI illustration is 678x921px. We place it at the top. */
        .illustration {
            position: absolute;
            top: 0; left: 0; width: 678px; height: 921px;
            background-image: url('${IMG_PATH}');
            background-size: 100% 100%;
        }

        /* 
           PATCH: Covers the old name/subtitle. 
           Made tall enough to hide all AI-generated text variations.
        */
        .name-patch {
            position: absolute;
            top: 615px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 160px;
            background: #000;
            z-index: 5;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .id-name {
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 42px;
            color: ${COLOR}; text-transform: uppercase; margin: 0;
            letter-spacing: 2px; line-height: 1;
        }

        .subtitle {
            font-family: 'Cinzel', serif; font-size: 19px; color: #cbd5e1; font-style: italic;
            margin-top: 10px; opacity: 0.9; font-weight: 400;
        }

        /* 
           STATS: Fully black area to cover old labels and boxes.
        */
        .stats-area {
            position: absolute;
            top: 775px; left: 0; right: 0; bottom: 0;
            background: #000;
            z-index: 10;
            padding: 10px 24px 25px 24px;
            display: flex; align-items: center; justify-content: center;
        }

        .stats-grid {
            width: 100%; display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 14px; align-items: center;
        }

        .stat-box {
            background: #000; border: 3px solid ${COLOR};
            border-radius: 12px; height: 120px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .stat-l {
            font-family: 'Cinzel', serif; font-size: 14px; color: #e2e8f0; 
            text-transform: uppercase; font-weight: 700; margin-bottom: 6px; letter-spacing: 1px;
        }

        .stat-v {
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 34px;
            color: #fff; line-height: 1;
        }

        .origin-badge {
            position: absolute; top: 35px; right: 35px; z-index: 10;
            background: rgba(0,0,0,0.85); color: ${COLOR};
            border: 2px solid ${COLOR}; border-radius: 8px;
            font-family: 'Cinzel', serif; font-size: 14px; padding: 5px 15px; 
            text-transform: uppercase; font-weight: 700;
        }
    </style>
</head>
<body>
    <svg width="0" height="0" style="position:absolute; z-index:-1;">
        <filter id="sharpen">
            <feConvolveMatrix order="3" kernelMatrix="0 -1 0 -1 5 -1 0 -1 0" preserveAlpha="true"/>
        </filter>
    </svg>

    <div class="card-container">
        <div class="illustration"></div>
        <div class="origin-badge">${ORIGIN}</div>
        
        <div class="name-patch">
            <h1 class="id-name">${ID} - ${NAME}</h1>
            <div class="subtitle">${SUBTITLE}</div>
        </div>
        
        <div class="stats-area">
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-l">Síla</span>
                    <span class="stat-v">${SILA}</span>
                </div>
                <div class="stat-box">
                    <span class="stat-l">Magie</span>
                    <span class="stat-v">${MAGIE}</span>
                </div>
                <div class="stat-box">
                    <span class="stat-l">Stáří</span>
                    <span class="stat-v">${STARI}</span>
                </div>
                <div class="stat-box">
                    <span class="stat-l">Hrozivost</span>
                    <span class="stat-v">${HROZIVOST}</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
