
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            /* Standard card size for 678x921 px output */
            --card-width: 678px;
            --card-height: 921px;
            --gold: #d4af37;
            --gold-gradient: linear-gradient(135deg, #fde047 0%, #d4af37 50%, #8b6e00 100%);
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #card-container {
            width: var(--card-width);
            height: var(--card-height);
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .back-image {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background-size: 106% 106%; /* Slight zoom to eliminate any edge artifacts or integrated borders */
            background-repeat: no-repeat;
            background-position: center;
        }
    </style>
</head>
<body>
    <div id="card-container">
        <div id="bg-div" class="back-image"></div>
    </div>

    <script>
        window.renderBack = (imgUrl) => {
            document.getElementById('bg-div').style.backgroundImage = `url('${imgUrl}')`;
        }
    </script>
</body>
</html>
